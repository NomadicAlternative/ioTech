; ioTech ESP32 Firmware
; PlatformIO project configuration

[platformio]
default_envs = esp32dev

; ── Common settings shared by all ESP32 environments ────────────────
[common]
platform          = espressif32@6.9.0
framework         = espidf
monitor_speed     = 115200
board_build.embed_txtfiles =
    data/portal/index.html
    data/portal/styles.css
    data/portal/app.js
    certs/isrg_root_x1.pem
test_build_project_source = yes
build_flags_common =
    -DCONFIG_ESP_HTTPS_OTA_ALLOW_HTTP=0
    -DCONFIG_NVS_ENCRYPTION=1
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO
    -DCONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=y
    -I${platformio.packages_dir}/framework-espidf/components/json/cJSON
    -I${platformio.packages_dir}/framework-espidf/components/esp_timer/include
    -DIO_DRIVER_MANUAL_REGISTRY

; ── ESP32 DevKit V1 (default) ────────────────────────────────────────
[env:esp32dev]
platform          = ${common.platform}
board             = esp32dev
framework         = ${common.framework}
monitor_speed     = ${common.monitor_speed}
board_build.embed_txtfiles = ${common.board_build.embed_txtfiles}
build_flags       =
    ${common.build_flags_common}
    -DBOARD_ESP32_DEVKIT
board_build.partitions = partitions.csv

; ── ESP32-S3 ─────────────────────────────────────────────────────────
[env:esp32s3]
platform          = ${common.platform}
board             = esp32-s3-devkitc-1
framework         = ${common.framework}
monitor_speed     = ${common.monitor_speed}
board_build.embed_txtfiles = ${common.board_build.embed_txtfiles}
build_flags       =
    ${common.build_flags_common}
    -DBOARD_ESP32_S3
board_build.partitions = partitions.csv

; ── ESP32-C3 ─────────────────────────────────────────────────────────
[env:esp32c3]
platform          = ${common.platform}
board             = esp32-c3-devkitm-1
framework         = ${common.framework}
monitor_speed     = ${common.monitor_speed}
board_build.embed_txtfiles = ${common.board_build.embed_txtfiles}
build_flags       =
    ${common.build_flags_common}
    -DBOARD_ESP32_C3
board_build.partitions = partitions.csv

; ── ESP32-CAM (AI-Thinker) ───────────────────────────────────────────
[env:esp32cam]
platform          = ${common.platform}
board             = esp32cam
framework         = ${common.framework}
monitor_speed     = ${common.monitor_speed}
board_build.embed_txtfiles = ${common.board_build.embed_txtfiles}
build_flags       =
    ${common.build_flags_common}
    -DBOARD_ESP32_CAM
board_build.partitions = partitions.csv

; ── Native unit tests (host) ──────────────────────────────────────────
[env:native]
platform = native
test_framework = unity
build_flags =
    -DUNIT_TEST
    -DMOCK_ESP_IDF
    -DBOARD_ESP32_DEVKIT
    -I test/mocks
    -I components/io_driver/include
    -I components/io_driver_pal/include
    -I components/io_board/include
    -I components/drivers/drv_dht22/include
    -I components/drivers/drv_relay/include
    -I components/drivers/drv_bme280/include
    -I components/drivers/drv_ds18b20/include
    -I components/drivers/drv_pir/include
    -I components/drivers/drv_hcsr04/include
    -I components/drivers/drv_ws2812b/include
    -I components/drivers/drv_servo/include
    -I components/drivers/drv_ssd1306/include
    -I components/drivers/drv_lcd1602/include
