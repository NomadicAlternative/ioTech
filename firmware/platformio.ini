; ioTech ESP32 Firmware
; PlatformIO project configuration

[env:esp32dev]
platform   = espressif32@6.9.0
board      = esp32dev
framework  = espidf
board_build.partitions = partitions.csv
monitor_speed = 115200
build_flags =
    -DCONFIG_ESP_HTTPS_OTA_ALLOW_HTTP=0
    -DCONFIG_NVS_ENCRYPTION=1
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO
    -DCONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=y
    -I${platformio.packages_dir}/framework-espidf/components/json/cJSON
board_build.embed_txtfiles =
    data/portal/index.html
    data/portal/styles.css
    data/portal/app.js
    certs/isrg_root_x1.pem
test_build_project_source = yes

[env:native]
platform = native
test_framework = unity
build_flags =
    -DUNIT_TEST
    -DMOCK_ESP_IDF
    -I test/mocks
