name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: iotech
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/iotech/app
            git pull origin main
            cd /home/iotech
            docker compose up -d --build backend
            docker compose restart backend

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npx vite build
        env:
          VITE_API_URL: https://beepdash.com

      - name: Deploy frontend to VPS
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: iotech
          TARGET: /home/iotech/frontend-deploy
          SOURCE: frontend/dist/

      - name: Activate frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: iotech
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/iotech/*
            sudo cp -r /home/iotech/frontend-deploy/* /var/www/iotech/
            sudo chmod -R 755 /var/www/iotech
            sudo systemctl reload nginx
