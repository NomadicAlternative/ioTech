name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npx vite build
        env:
          VITE_API_URL: https://beepdash.com

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          scp -r frontend/dist/* iotech@${{ secrets.VPS_HOST }}:/home/iotech/frontend-deploy/
          ssh iotech@${{ secrets.VPS_HOST }} '
            sudo rm -rf /var/www/iotech/*
            sudo cp -r /home/iotech/frontend-deploy/* /var/www/iotech/
            sudo chmod -R 755 /var/www/iotech
            sudo systemctl reload nginx
          '

      - name: Deploy backend
        run: |
          ssh iotech@${{ secrets.VPS_HOST }} '
            cd /home/iotech/app
            git pull origin main
            cd /home/iotech
            docker compose up -d --build backend
          '
